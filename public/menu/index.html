<meta name="twitter:image" content="https://sheedosa.github.io/oro-menu/img/og-image.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700&family=Cormorant+Garamond:wght@400;500;600&family=Cormorant+SC:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --burgundy: #5a2829;
    --burgundy-deep: #481e1f;
    --burgundy-soft: #683033;
    --gold: #c4a35a;
    --gold-soft: #d6bd7e;
    --gold-deep: #9d8242;
    --blush: #ead9d6;
    --blush-soft: #ead8d4;
    --cream: #f4e6e1;
    --ink: #3d1320;
    --ink-soft: #6a3041;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--burgundy);
    color: #fff;
    font-family: 'Inter', 'Tajawal', system-ui, sans-serif;
    font-weight: 400;
    line-height: 1.5;
    overflow-x: hidden;
  }

  /* ============ Background pattern ============ */
  .pattern-bg {
    position: relative;
    isolation: isolate;
  }
  .pattern-bg::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 18% 22%, rgba(196,163,90,.05) 0 1px, transparent 2px),
      radial-gradient(circle at 78% 38%, rgba(196,163,90,.04) 0 1px, transparent 2px),
      radial-gradient(circle at 42% 78%, rgba(196,163,90,.05) 0 1px, transparent 2px),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='600' height='600' viewBox='0 0 600 600'><g fill='none' stroke='%23c4a35a' stroke-width='.6' opacity='.07'><path d='M50 300c40-80 110-120 200-90s130 100 90 200-150 110-220 50-120-100-70-160z'/><path d='M120 380c40-60 110-90 180-50s100 110 50 170-150 60-200 0-70-70-30-120z'/><path d='M300 100c50-30 130-10 170 50s30 130-30 170-150 30-190-30 0-160 50-190z'/><path d='M380 320c30-40 100-60 150-20s50 120 0 170-140 30-170-30-10-90 20-120z'/></g></svg>");
    background-size: auto, auto, auto, 600px 600px;
    opacity: .9;
    z-index: -1;
    pointer-events: none;
  }
  .pattern-bg.light::before {
    background: none;
  }

  /* ============ Typography helpers ============ */
  .ar { font-family: 'Cairo', 'Tajawal', 'Segoe UI', sans-serif; direction: rtl; }
  .en-serif { font-family: 'Cormorant SC', 'Cormorant Garamond', serif; letter-spacing: .25em; font-weight: 500; }
  .en-display { font-family: 'Cormorant Garamond', serif; }

  /* ============ Single-language filtering (driven by ?lang= on the URL) ============
     The site links here with ?lang=ar or ?lang=en so the menu shows ONLY that
     language: Arabic on the Arabic site, English on the English site. A small
     head script adds .lang-ar / .lang-en to <html>. Defaults to Arabic. */
  html.lang-ar .item .name .en,
  html.lang-ar .category-scroll a .nav-en,
  html.lang-ar .section-head .en-title,
  html.lang-ar .hero-scroll .scroll-en,
  html.lang-ar .note-en,
  html.lang-ar .subcat-en,
  html.lang-ar .footer-addr-en,
  html.lang-ar .filter-chip .chip-en { display: none !important; }

  html.lang-en .item .name .ar,
  html.lang-en .category-scroll a .nav-ar,
  html.lang-en .section-head .ar-title,
  html.lang-en .hero-scroll .scroll-ar,
  html.lang-en .note-ar,
  html.lang-en .subcat-ar,
  html.lang-en .footer-addr-ar,
  html.lang-en .filter-chip .chip-ar { display: none !important; }

  /* Per-language note + subcat text styling (only one language ever shows). */
  .note-ar { font-family: 'Cairo', 'Tajawal', sans-serif; direction: rtl; }
  .note-en { direction: ltr; }
  .subcat-ar { direction: rtl; }
  html.lang-en .subcat .subcat-en {
    font-family: 'Cormorant SC', 'Cormorant Garamond', serif;
    letter-spacing: .18em;
  }

  /* English-only: promote the English text from a faded subtitle to the primary line. */
  html.lang-en .item .name .en {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(16px, 2vw, 20px);
    font-style: normal;
    font-weight: 500;
    opacity: 1;
    letter-spacing: .02em;
  }
  html.lang-en .category-scroll a .nav-en {
    font-size: 13px;
    letter-spacing: .12em;
    opacity: 1;
  }
  html.lang-en .section-head .en-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    letter-spacing: .1em;
    font-size: clamp(30px, 5vw, 52px);
    margin-top: 0;
  }

  .container {
    width: min(1180px, 100% - 40px);
    margin-inline: auto;
  }

  /* ============ Hero ============ */
  .hero {
    min-height: 88vh;
    display: grid;
    place-items: center;
    text-align: center;
    padding: 80px 0 60px;
    position: relative;
    overflow: hidden;
  }
  /* Drop a hero-bg.jpg into img/ and it appears automatically */
  .hero::after {
    content: '';
    position: absolute; inset: 0;
    background-image: var(--hero-bg, none);
    background-size: cover;
    background-position: center;
    opacity: .12;
    z-index: 0;
    pointer-events: none;
  }
  .hero-content { position: relative; z-index: 2; }
  .hero .eyebrow {
    font-family: 'Cormorant SC', serif;
    letter-spacing: .5em;
    font-size: 12px;
    color: var(--gold);
    margin-bottom: 22px;
  }
  .hero .logo {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: clamp(80px, 16vw, 180px);
    line-height: 1.1;
    color: var(--gold);
    letter-spacing: .04em;
    display: inline-block;
    position: relative;
    padding-top: .08em;
  }
  /* Official ORO logo */
  .hero .logo-img {
    display: block;
    width: min(260px, 58vw);
    height: auto;
    margin: 0 auto;
    image-rendering: -webkit-optimize-contrast;
  }
  .hero .logo .swash {
    display: inline-block;
    font-style: italic;
    transform: translateY(.06em);
  }
  .hero .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(20px, 3.4vw, 34px);
    color: var(--blush);
    font-weight: 400;
    margin-top: 6px;
    letter-spacing: .04em;
  }
  .hero .arabic-name {
    font-family: 'Cairo', 'Tajawal', sans-serif;
    direction: rtl;
    color: rgba(214,189,126,.65);
    font-size: clamp(14px, 2vw, 18px);
    margin-top: 28px;
    letter-spacing: .04em;
  }
  .hero .divider {
    width: 60px; height: 1px;
    background: var(--gold);
    margin: 34px auto 28px;
    opacity: .7;
  }
  .hero-hours {
    display: inline-flex; flex-direction: column; gap: 4px;
    padding: 14px 28px;
    border: 1px solid rgba(196,163,90,.35);
    border-radius: 999px;
    background: rgba(71,21,35,.45);
    font-size: 13px;
    letter-spacing: .14em;
    color: rgba(255,255,255,.85);
  }
  .hero-hours strong { color: var(--gold-soft); font-weight: 500; letter-spacing: .18em; }
  .hero-scroll {
    margin-top: 72px;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    color: #fff;
    text-decoration: none;
    transition: opacity .3s ease;
    opacity: .92;
  }
  .hero-scroll:hover { opacity: 1; }
  .hero-scroll:hover .scroll-line { height: 44px; }
  .hero-scroll .scroll-ar {
    font-family: 'Cairo', 'Tajawal', sans-serif;
    font-size: 15px;
    font-weight: 400;
    line-height: 1.2;
    direction: rtl;
    color: #fff;
  }
  .hero-scroll .scroll-en {
    font-family: 'Cormorant SC', serif;
    font-size: 9px;
    letter-spacing: .42em;
    color: var(--gold);
    margin-top: 2px;
  }
  .hero-scroll .scroll-line {
    width: 1px;
    height: 32px;
    background: linear-gradient(to bottom, rgba(196,163,90,.55), transparent);
    margin-top: 16px;
    transition: height .35s ease;
  }

  /* ============ Intro / Story ============ */
  .intro {
    padding: 100px 0 80px;
    text-align: center;
  }
  .intro .body {
    max-width: 640px;
    margin: 0 auto;
  }
  .intro p {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(20px, 2.4vw, 26px);
    line-height: 1.55;
    color: var(--blush);
    font-weight: 400;
    margin: 0;
  }
  .intro p + p { margin-top: 22px; }
  .intro .ar-quote {
    font-family: 'Cairo', 'Tajawal', sans-serif;
    direction: rtl;
    color: rgba(214,189,126,.85);
    font-size: 18px;
    line-height: 1.8;
    margin-top: 28px;
  }
  .intro .ornament {
    color: var(--gold);
    font-size: 28px;
    letter-spacing: .8em;
    margin-bottom: 22px;
    opacity: .8;
  }

  /* ============ Category strip ============ */
  .category-strip {
    background: var(--burgundy-deep);
    border-top: 1px solid rgba(196,163,90,.18);
    border-bottom: 1px solid rgba(196,163,90,.18);
    position: sticky; top: 0; z-index: 40;
  }
  .category-strip .container {
    position: relative;
  }
  /* Edge gradient fades — visual cue that more content scrolls beyond view */
  .category-strip .container::before,
  .category-strip .container::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 42px;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    transition: opacity .25s ease;
  }
  .category-strip .container::before {
    left: 0;
    background: linear-gradient(to right, var(--burgundy-deep) 20%, transparent);
  }
  .category-strip .container::after {
    right: 0;
    background: linear-gradient(to left, var(--burgundy-deep) 20%, transparent);
  }
  .category-strip.can-scroll-left .container::before { opacity: 1; }
  .category-strip.can-scroll-right .container::after { opacity: 1; }
  /* Chevron indicators inside the fade gradient */
  .category-strip .chevron {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 24px; height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold);
    font-size: 18px;
    line-height: 1;
    z-index: 3;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease;
    font-family: 'Cormorant Garamond', serif;
  }
  .category-strip .chevron.left { left: 8px; }
  .category-strip .chevron.right { right: 8px; }
  .category-strip.can-scroll-left .chevron.left { opacity: .85; }
  .category-strip.can-scroll-right .chevron.right { opacity: .85; }
  .category-scroll {
    display: flex; gap: 0;
    overflow-x: auto;
    scroll-snap-type: x proximity;
    scrollbar-width: none;
    padding: 0;
    scroll-behavior: smooth;
  }
  .category-scroll::-webkit-scrollbar { display: none; }
  .category-scroll a {
    flex: 0 0 auto;
    padding: 12px 20px;
    color: rgba(255,255,255,.7);
    text-decoration: none;
    scroll-snap-align: start;
    border-right: 1px solid rgba(196,163,90,.1);
    transition: color .2s, background .2s;
    white-space: nowrap;
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1.1;
    gap: 3px;
  }
  .category-scroll a .nav-ar {
    font-family: 'Cairo', 'Tajawal', 'Segoe UI', sans-serif;
    font-size: 15px;
    font-weight: 500;
    direction: rtl;
    letter-spacing: 0;
    font-feature-settings: "kern" 1, "liga" 1;
    line-height: 1.2;
  }
  .category-scroll a .nav-en {
    font-family: 'Cormorant SC', serif;
    font-size: 9px;
    letter-spacing: .25em;
    text-transform: uppercase;
    opacity: .75;
    line-height: 1;
  }
  .category-scroll a:hover { color: var(--gold-soft); }
  .category-scroll a.active {
    color: var(--gold);
    background: rgba(196,163,90,.1);
    box-shadow: inset 0 -2px 0 var(--gold);
  }

  /* ============ Section base ============ */
  section.menu-section {
    padding: 90px 0 100px;
    position: relative;
    scroll-margin-top: 110px;
  }
  section.dark { background: var(--burgundy); color: #fff; }
  section.light { background: var(--blush-soft); color: var(--ink); }

  .section-head {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 24px;
    margin-bottom: 50px;
  }
  .section-head .line {
    height: 1px;
    background: linear-gradient(to right, transparent, currentColor);
    opacity: .25;
  }
  .section-head .line.right { background: linear-gradient(to left, transparent, currentColor); }
  .section-head .title-block { text-align: center; }
  .section-head .ar-title {
    font-family: 'Cairo', 'Tajawal', sans-serif;
    direction: rtl;
    font-weight: 700;
    font-size: clamp(36px, 6vw, 64px);
    line-height: 1;
    letter-spacing: .02em;
    margin: 0;
  }
  section.dark .section-head .ar-title { color: #fff; }
  section.light .section-head .ar-title { color: var(--burgundy); }
  .section-head .en-title {
    font-family: 'Cormorant SC', serif;
    font-weight: 500;
    letter-spacing: .5em;
    font-size: clamp(13px, 1.4vw, 16px);
    margin-top: 14px;
    color: var(--gold);
  }
  section.light .section-head .en-title { color: var(--gold-deep); }

  /* ============ Menu grid — stacked: image then items ============ */
  .menu-grid,
  .menu-grid.flip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
  }
  .menu-grid .photo-cell,
  .menu-grid.flip .photo-cell { order: -1; }
  .menu-grid .items-cell,
  .menu-grid.flip .items-cell { order: 1; width: 100%; }

  /* ============ Photo cell ============ */
  .photo-cell {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .photo-cell .frame {
    width: 100%;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .photo-cell .frame img,
  .photo-cell .frame video {
    width: 100%;
    height: auto;
    max-height: 520px;
    display: block;
    object-fit: contain;
    transition: transform 0.5s ease;
    border-radius: 12px;
  }
  /* Video-only: feather edges on all sides so cups float on the menu */
  .photo-cell .frame video {
    -webkit-mask-image:
      linear-gradient(to bottom, transparent 0%, #000 12%, #000 65%, transparent 92%),
      linear-gradient(to right,  transparent 0%, #000 8%,  #000 92%, transparent 100%);
    -webkit-mask-composite: source-in;
    mask-image:
      linear-gradient(to bottom, transparent 0%, #000 12%, #000 65%, transparent 92%),
      linear-gradient(to right,  transparent 0%, #000 8%,  #000 92%, transparent 100%);
    mask-composite: intersect;
    border-radius: 0;
  }
  @media (max-width: 860px) {
    .photo-cell { max-width: 100%; }
    .photo-cell .frame img,
    .photo-cell .frame video { max-height: 360px; }
  }
  .photo-cell .frame:hover img,
  .photo-cell .frame:hover video {
    transform: scale(1.04);
  }
  /* Caption beneath image */
  .photo-cell .caption {
    text-align: center;
    font-family: 'Cormorant SC', serif;
    letter-spacing: .35em;
    font-size: 10px;
    color: var(--gold);
    margin-top: 14px;
    opacity: .8;
  }
  .photo-cell .caption::before,
  .photo-cell .caption::after {
    content: '·';
    margin: 0 10px;
    opacity: .7;
  }

  /* ============ Item list ============ */
  .item-list {
    list-style: none;
    padding: 0; margin: 0;
    display: flex; flex-direction: column;
    gap: 2px;
  }
  .item {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: baseline;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px dashed currentColor;
    border-color: rgba(196,163,90,.22);
  }
  section.light .item { border-color: rgba(86,26,43,.18); }

  .item .name {
    display: flex; flex-direction: column;
    gap: 2px;
  }
  .item .name .ar {
    font-size: clamp(17px, 2vw, 21px);
    font-weight: 500;
    line-height: 1.2;
  }
  .item .name .en {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    opacity: .65;
    letter-spacing: .04em;
    font-style: italic;
  }
  .item .name .note {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    opacity: .55;
    letter-spacing: .04em;
    margin-top: 2px;
  }
  .item .price {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(18px, 2.1vw, 22px);
    font-weight: 600;
    color: var(--gold);
    white-space: nowrap;
    letter-spacing: .04em;
  }
  section.light .item .price { color: var(--gold-deep); }
  .item .price .unit { font-size: .65em; opacity: .7; margin-left: 4px; letter-spacing: .12em; }

  /* Featured / signature item */
  .item.featured {
    background: linear-gradient(90deg, rgba(196,163,90,.06), rgba(196,163,90,.12) 50%, rgba(196,163,90,.06));
    padding-inline: 14px;
    border-radius: 6px;
    border-bottom-color: transparent;
    position: relative;
  }
  .item.featured::before {
    content: '✦';
    position: absolute;
    left: -2px;
    top: 50%; transform: translateY(-50%);
    font-size: 8px;
    color: var(--gold);
    opacity: .8;
  }
  .item.featured .name .ar { color: var(--gold); font-weight: 600; }
  section.light .item.featured .name .ar { color: var(--burgundy-deep); font-weight: 700; }

  /* Subcategory tag */
  .subcat {
    display: inline-block;
    background: var(--gold);
    color: var(--burgundy);
    padding: 6px 18px;
    border-radius: 999px;
    font-family: 'Cairo', 'Tajawal', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: .04em;
    margin: 18px 0 6px;
  }
  .subcat.en {
    font-family: 'Cormorant SC', serif;
    letter-spacing: .25em;
    font-size: 11px;
  }

  /* Two-price size columns (juices) */
  .size-row {
    display: grid; grid-template-columns: 1fr 90px 90px; gap: 16px;
    padding: 8px 0 10px;
    border-bottom: 1px solid rgba(196,163,90,.3);
    margin-bottom: 6px;
  }
  .size-row .size-tag {
    text-align: center;
    background: var(--gold);
    color: var(--burgundy);
    padding: 4px 0;
    border-radius: 999px;
    font-family: 'Cairo', 'Tajawal', sans-serif;
    font-weight: 700;
    font-size: 12px;
  }
  .item.two-price {
    grid-template-columns: 1fr 90px 90px;
  }
  .item.two-price .price { text-align: center; }

  /* ============ Footer ============ */
  .site-footer {
    background: var(--burgundy-deep);
    padding: 60px 20px 40px;
    border-top: 1px solid rgba(196,163,90,.2);
    text-align: center;
  }
  .site-footer .footer-ornament {
    color: var(--gold);
    letter-spacing: 1em;
    opacity: .55;
    font-size: 14px;
    margin-bottom: 18px;
  }
  .site-footer .footer-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    color: var(--gold);
    letter-spacing: .12em;
    line-height: 1;
  }
  .site-footer .footer-sub {
    font-family: 'Cormorant SC', serif;
    letter-spacing: .35em;
    font-size: 11px;
    color: rgba(214,189,126,.7);
    margin-top: 8px;
  }
  .site-footer .footer-address {
    margin-top: 22px;
    font-size: 14px;
    letter-spacing: .04em;
    color: rgba(255,255,255,.72);
    line-height: 1.5;
  }
  .site-footer .footer-addr-ar {
    font-family: 'Cairo', 'Tajawal', sans-serif;
    direction: rtl;
  }
  .site-footer .footer-hours {
    margin-top: 14px;
    font-size: 13px;
    letter-spacing: .14em;
    color: rgba(255,255,255,.7);
  }
  .site-footer .footer-sep {
    opacity: .4;
    margin: 0 14px;
  }
  .site-footer .footer-link {
    display: block;
    margin-top: 14px;
    color: var(--gold-soft);
    text-decoration: none;
    font-family: 'Cormorant SC', serif;
    letter-spacing: .3em;
    font-size: 11px;
    transition: color .2s;
  }
  .site-footer .footer-link:hover { color: var(--gold); }

  /* ============ Responsive ============ */
  @media (max-width: 760px) {
    section.menu-section { padding: 44px 0 52px; }
    .section-head { gap: 14px; margin-bottom: 24px; }
    .section-head .en-title { margin-top: 10px; }
    .menu-grid, .menu-grid.flip { gap: 22px; }
    .item { padding: 11px 0; }
    .item .name .ar { font-size: clamp(16px, 4.6vw, 19px); }
    .item .name .en { font-size: 12px; }
    .item .price { font-size: 17px; }
    .subcat { padding: 8px 14px; margin: 16px 0 10px; font-size: 11px; }
    .hero { min-height: 80vh; padding: 60px 0 40px; }
    .intro { padding: 60px 0 50px; }
    .category-strip { top: 0; }
    .category-scroll a { padding: 12px 16px; font-size: 11px; letter-spacing: .2em; }
  }

  /* ============ Two-column desktop layout ============
     Place the category photo BESIDE the item list on wider screens; `.flip`
     swaps the photo to the opposite side so sides alternate down the page.
     Mobile keeps the stacked column (photo on top). */
  @media (min-width: 861px) {
    .menu-grid,
    .menu-grid.flip {
      flex-direction: row;
      align-items: center;
      gap: clamp(36px, 5vw, 72px);
    }
    .menu-grid > .photo-cell { order: 0; flex: 0 0 44%; max-width: 44%; }
    .menu-grid > .items-cell { order: 1; flex: 1 1 auto; width: auto; }
    .menu-grid.flip > .photo-cell { order: 2; }      /* photo on the right */
    /* froby (no photo): keep the list comfortably narrow, not full-bleed */
    .menu-grid:not(:has(.photo-cell)) > .items-cell { max-width: 760px; margin-inline: auto; }
  }

  /* ============ Interactive item rows (desktop pointer only) ============ */
  @media (hover: hover) and (min-width: 861px) {
    .item { transition: background-color .2s ease, box-shadow .2s ease; border-radius: 8px; }
    section.dark .item:hover { background: rgba(196,163,90,.07); box-shadow: inset 0 0 0 1px rgba(196,163,90,.14); }
    section.light .item:hover { background: rgba(86,26,43,.05); box-shadow: inset 0 0 0 1px rgba(86,26,43,.10); }
    .item:hover .price { color: var(--gold-soft); }
    section.light .item:hover .price { color: var(--gold-deep); }
  }

  /* ============ Scroll progress bar ============ */
  .scroll-progress {
    position: fixed; top: 0; left: 0; height: 3px; width: 100%;
    transform: scaleX(0); transform-origin: left;
    background: linear-gradient(90deg, var(--gold-deep), var(--gold-soft));
    z-index: 60; pointer-events: none;
    transition: transform .08s linear;
  }

  /* ============ Filter chips ============ */
  .filter-bar {
    display: flex; justify-content: center; flex-wrap: wrap; gap: 8px;
    padding: 11px 0 10px;
    border-bottom: 1px solid rgba(196,163,90,.12);
  }
  .filter-chip {
    appearance: none; cursor: pointer;
    background: transparent;
    border: 1px solid rgba(196,163,90,.32);
    color: rgba(255,255,255,.74);
    border-radius: 999px;
    padding: 6px 16px;
    font-family: 'Cormorant SC', serif;
    font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
    line-height: 1;
    transition: color .2s, background .2s, border-color .2s;
    white-space: nowrap;
  }
  .filter-chip .chip-ar {
    font-family: 'Cairo', 'Tajawal', sans-serif; direction: rtl;
    font-size: 13px; letter-spacing: 0; text-transform: none;
  }
  .filter-chip:hover { color: var(--gold-soft); border-color: rgba(196,163,90,.55); }
  .filter-chip.active {
    background: var(--gold); border-color: var(--gold);
    color: var(--burgundy); font-weight: 600;
  }
  @media (max-width: 760px) {
    .filter-bar {
      flex-wrap: nowrap; justify-content: flex-start;
      overflow-x: auto; scrollbar-width: none;
      /* left gap so the first chip clears the fixed "← ORO" pill when sticky */
      padding: 9px 0 8px 100px;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip { padding: 6px 13px; font-size: 10px; flex: 0 0 auto; }
  }

  /* Featured-only filter: hide every non-featured row + now-empty scaffolding */
  body.filter-featured .item:not(.featured),
  body.filter-featured .subcat,
  body.filter-featured .size-row { display: none !important; }

  /* ============ Back to top ============ */
  .back-to-top {
    position: fixed; right: 18px; bottom: 20px; z-index: 50;
    width: 46px; height: 46px; border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(72,30,31,.82);
    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    border: 1px solid rgba(196,163,90,.5);
    color: var(--gold-soft); font-size: 20px; line-height: 1;
    cursor: pointer;
    opacity: 0; transform: translateY(12px); pointer-events: none;
    transition: opacity .3s ease, transform .3s ease, background .2s, color .2s;
  }
  .back-to-top.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .back-to-top:hover { background: var(--gold); color: var(--burgundy); }
</style>
<!-- Show a single language based on ?lang= (ar | en). Default: Arabic (site default).
     Runs before paint so only the active language is ever rendered. -->
<script>
  (function () {
    var l = 'ar';
    try {
      var p = new URLSearchParams(window.location.search).get('lang');
      if (p === 'en') l = 'en';
    } catch (e) {}
    document.documentElement.lang = l;
    document.documentElement.classList.add('lang-' + l);
  })();
</script>
</head>
